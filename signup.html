<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickCure – Create Account</title>
  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="signup.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo">
      <a style="color:#fff;text-decoration:none;">
        <img src="QuickCureLogo.jpg" alt="QuickCure Medical Logo" />
        QuickCure
      </a>
    </div>
    <nav>
      <a href="index.html">Home</a>
      <a class="SignIn" href="signin.html">Sign In</a>
    </nav>
  </header>

  <main class="auth-container">
    <h1>Create Your Account</h1>
    <form id="signupForm">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Enter your full name" required />

      <label>Email Address</label>
      <input type="email" id="email" placeholder="Enter your email address" required />

      <label>Password</label>
      <input type="password" id="password" placeholder="Create a strong password" required />
      <div id="passwordStrength" class="password-strength">Password strength: <span class="strength-weak">Weak</span></div>

      <label>Role</label>
      <select id="role" onchange="toggleDoctorFields()">
        <option value="">Select your role</option>
        <option value="doctor">Doctor/Medical Professional</option>
        <option value="patient">Patient</option>
      </select>

      <div id="doctorFields">
        <label>Medical License Number</label>
        <input type="text" id="license" placeholder="Enter your medical license number" />

        <label>Specialization</label>
        <select id="specialization">
          <option value="">Select your specialization</option>
          <option value="cardiology">Cardiology</option>
          <option value="dermatology">Dermatology</option>
          <option value="orthopedics">Orthopedics</option>
          <option value="pediatrics">Pediatrics</option>
          <option value="ent">ENT</option>
          <option value="psychiatry">Psychiatry</option>
          <option value="general">General Physician</option>
          <option value="neurology">Neurology</option>
          <option value="oncology">Oncology</option>
          <option value="gynecology">Gynecology</option>
        </select>

        <label>Years of Experience</label>
        <input type="number" id="experience" placeholder="Years of experience" min="0" max="50" />

        <label>Hospital Affiliation</label>
        <select id="hospitalAffiliation">
          <option value="">-- Select Hospital --</option>
          <option value="apollo">Apollo Hospitals</option>
          <option value="fortis">Fortis Healthcare</option>
          <option value="max">Max Super Speciality</option>
          <option value="medanta">Medanta The Medicity</option>
          <option value="artemis">Artemis Hospitals</option>
          <option value="city_general">City General Hospital</option>
          <option value="green_valley">Green Valley Multi-speciality</option>
          <option value="metro_care">Metro Care Clinic</option>
          <option value="national_health">National Health Center</option>
          <option value="apollo_speciality">Apollo Speciality Hospital</option>
          <option value="fortis_healthcare">Fortis Healthcare</option>
        </select>

        <label>City</label>
        <select id="doctorCity">
          <option value="">-- Choose City --</option>
          <option value="delhi">Delhi</option>
          <option value="mumbai">Mumbai</option>
          <option value="bengaluru">Bengaluru</option>
          <option value="kolkata">Kolkata</option>
          <option value="chennai">Chennai</option>
          <option value="hyderabad">Hyderabad</option>
          <option value="pune">Pune</option>
          <option value="lucknow">Lucknow</option>
        </select>

        <label>Qualification</label>
        <input type="text" id="qualification" placeholder="e.g., MBBS, MD" />

        <label>Bio/Description</label>
        <textarea id="bio" placeholder="Brief description about your expertise and experience..." rows="3"></textarea>
      </div>

      <div class="terms-checkbox">
        <input type="checkbox" id="terms" required />
        <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
      </div>

      <button type="submit" class="btn">Create Account</button>
    </form>
    <p>Already have an account? <a href="signin.html">Sign in here</a></p>
  </main>
  
  <script defer src="auth.js"></script>
  <footer>
    <p>© 2025 QuickCure. Making healthcare accessible for everyone.</p>
  </footer>
</body>
</html>
